<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kairo Overlay</title>
  <link rel="stylesheet" href="./src/style.css">
</head>
<body>
  <div class="overlay-container glass">
    <header>
      <h1>Kairo Desktop Overlay</h1>
    </header>
    
    <main>
      <div class="control-panel">
        <div class="input-group">
          <label for="doc-selector">Document:</label>
          <select id="doc-selector">
            <option value="">-- Select Document --</option>
          </select>
        </div>
        
        <div class="input-group">
          <label for="query-input">Ask anything:</label>
          <input type="text" id="query-input" placeholder="Type your query here..." />
        </div>
        
        <button id="ask-btn">Ask</button>
      </div>

      <div class="result-section">
        <div id="answer-text" class="answer-display"></div>
        <div id="refusal-message" class="refusal-display" style="display: none;">
          Answer blocked: Response could not be verified or grounded.
        </div>
        <div id="citations-container" class="citations-chips"></div>
      </div>
      
      <div class="viewer-section">
        <div id="image-container" class="image-viewer">
          <img id="page-image" style="display: none; max-width: 100%; height: auto;" />
          <svg id="highlight-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;"></svg>
        </div>
      </div>
    </main>
  </div>
  
  <script type="module" src="./src/index.js"></script>
</body>
</html>
